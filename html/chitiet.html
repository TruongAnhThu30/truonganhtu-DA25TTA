<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm - CASEDLE STORE</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

   <link rel="stylesheet" href="../css/style6.css">

    <!-- Data -->
    <script src="../js/data.js"></script>
   
</head>

<body>

<div class="container py-5">

    <div id="product-detail" class="card shadow p-4">

        <h4 class="text-center text-muted">Đang tải sản phẩm...</h4>

    </div>

</div>
<!-- Sản phẩm liên quan -->
<div class="mt-5">

   

    <div id="related-products" class="row g-4"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const product = products.find(p => p.id === id);

const box = document.getElementById("product-detail");

if (product) {
    box.innerHTML = `
        <div class="row align-items-center">

            <div class="col-md-6 text-center">
                <img src="${product.img}" class="img-fluid rounded" style="max-height:400px;">
            </div>

            <div class="col-md-6">

                <h2 class="fw-bold">${product.name}</h2>

                <h4 class="text-danger">${product.price}</h4>

                <p class="text-muted">${product.desc}</p>

                <hr>

                <p>${product.detail}</p>

                <a href="javascript:history.back()" class="btn btn-secondary mt-3">
                    ← Quay lại
                </a>

            </div>

        </div>
    `;
} else {
    box.innerHTML = `
        <div class="text-center text-danger">
            <h3>Không tìm thấy sản phẩm</h3>
            <a href="javascript:history.back()" class="btn btn-dark mt-3">Quay lại</a>
        </div>
    `;
}


</script>

</body>
</html>
